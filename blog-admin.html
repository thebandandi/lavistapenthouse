<!DOCTYPE html>
<html>
<head><title>La Vista Emergency Admin</title></head>
<body style="background: #faf9f6; font-family: sans-serif; padding: 50px;">
    <h1>La Vista Posts (Emergency View)</h1>
    <button onclick="location.reload()" style="padding: 10px; margin-bottom: 20px;">Refresh Data</button>
    
    <div id="posts-list">Loading...</div>

    <script>
        async function load() {
            const list = document.getElementById('posts-list');
            try {
                const res = await fetch('/.netlify/functions/blog-posts');
                const posts = await res.json();
                
                if (!posts || posts.length === 0) {
                    list.innerHTML = "No posts found in database.";
                    return;
                }

                list.innerHTML = posts.map(p => `
                    <div style="background: white; border: 1px solid #ddd; padding: 20px; margin-bottom: 10px; border-radius: 8px;">
                        <h2 style="margin-top: 0;">${p.title || 'Untitled'}</h2>
                        <p><strong>Status:</strong> ${p.status} | <strong>ID:</strong> ${p.id}</p>
                        <img src="${p.displayImage}" style="width: 200px; border-radius: 4px;">
                        <hr>
                        <div style="max-height: 100px; overflow: hidden;">${p.content}</div>
                        <button onclick="alert('To edit, we will restore the full dashboard once you see this working.')" style="margin-top: 10px;">Edit Content</button>
                    </div>
                `).join('');
            } catch (err) {
                list.innerHTML = "Error: " + err.message;
            }
        }
        load();
    </script>
</body>
</html>
