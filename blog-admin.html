<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
<script>
    let quill = new Quill('#editor-container', { theme: 'snow' });
    let allPosts = [];
    let activePostId = null;

    async function loadPosts() {
        const listEl = document.getElementById('posts-list');
        try {
            const response = await fetch('/.netlify/functions/blog-posts');
            const data = await response.json();
            
            // Handle both Array and Object responses (Netlify Blobs can vary)
            allPosts = Array.isArray(data) ? data : (data.posts || []);
            
            console.log("Verified Data:", allPosts); 
            render();
        } catch (e) {
            console.error("Fetch Error:", e);
            listEl.innerHTML = `<p style="text-align:center; color:red;">Connection Error. Please refresh.</p>`;
        }
    }

    function render() {
        const listEl = document.getElementById('posts-list');
        
        if (!allPosts || allPosts.length === 0) {
            listEl.innerHTML = `<p style="text-align:center; padding: 40px;">No posts found in database.</p>`;
            return;
        }

        let html = '';
        
        // Sort safely
        const sorted = allPosts.sort((a, b) => {
            const dateA = new Date(a.date || a.createdAt || 0);
            const dateB = new Date(b.date || b.createdAt || 0);
            return dateB - dateA;
        });

        sorted.forEach(post => {
            try {
                // Ensure we have a valid ID and Title to show the card
                const id = post.id || post.key || 'unknown';
                const title = post.title || 'Untitled Cabo Update';
                const img = post.displayImage || 'https://via.placeholder.com/120x80?text=La+Vista';
                const status = post.status || 'draft';
                
                const dateObj = new Date(post.date || post.createdAt);
                const dateStr = isNaN(dateObj) ? 'New Update' : dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                html += `
                    <div class="post-card">
                        <img class="post-thumb" src="${img}" onerror="this.src='https://via.placeholder.com/120x80?text=Cabo'">
                        <div class="post-info">
                            <div class="post-meta">
                                ${dateStr}
                                <span class="status-badge ${status === 'published' ? 'published' : ''}">${status.toUpperCase()}</span>
                            </div>
                            <h3>${title}</h3>
                        </div>
                        <div class="post-actions">
                            <button class="btn" style="background: var(--sand); color: var(--deep-ocean);" onclick="openModal('${id}')">Edit</button>
                        </div>
                    </div>
                `;
            } catch (err) {
                console.warn("Skipping a malformed post:", err);
            }
        });

        listEl.innerHTML = html;
    }

    function openModal(id) {
        activePostId = id;
        const post = allPosts.find(p => (p.id === id || p.key === id));
        if (!post) return alert("Post data not found.");

        document.getElementById('edit-title').value = post.title || "";
        document.getElementById('edit-image').value = post.displayImage || "";
        
        const content = post.content || "";
        quill.root.innerHTML = content.includes('<p>') ? content : marked.parse(content);
        document.getElementById('edit-modal').classList.add('open');
    }

    function closeModal() { document.getElementById('edit-modal').classList.remove('open'); }

    async function saveAction(status) {
        const password = prompt("Admin Password:");
        if (!password) return;

        const data = {
            title: document.getElementById('edit-title').value,
            displayImage: document.getElementById('edit-image').value,
            content: quill.root.innerHTML,
            status: status,
            date: new Date().toISOString()
        };

        try {
            const res = await fetch(`/.netlify/functions/blog-posts?password=${password}&id=${activePostId}&action=edit`, {
                method: 'POST',
                body: JSON.stringify(data)
            });
            if (res.ok) {
                closeModal();
                loadPosts();
            } else {
                alert("Save failed. Check password.");
            }
        } catch (e) {
            alert("Network error while saving.");
        }
    }

    function triggerGen() {
        const password = prompt("Admin Password:");
        if (password) window.open(`/.netlify/functions/generate-blog-post?password=${password}`, '_blank');
    }

    loadPosts();
</script>
