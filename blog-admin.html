<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vista Admin | Luxury Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --sand: #d6c9b1;
            --warm-white: #faf9f6;
            --deep-ocean: #1a2e35;
            --gold-accent: #c5a059;
            --text: #2c2c2c;
            --border: #e8e4dc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--warm-white);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
        }

        .admin-container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(26, 46, 53, 0.05);
            border: 1px solid var(--border);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--sand);
            padding-bottom: 30px;
            margin-bottom: 40px;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--deep-ocean); margin: 0; }

        .generate-btn {
            background: var(--deep-ocean);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 0.5px;
        }

        .generate-btn:hover { background: var(--gold-accent); }

        /* Post Card Styling */
        .post-card {
            display: grid;
            grid-template-columns: 120px 1fr auto;
            gap: 20px;
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            align-items: center;
            transition: transform 0.2s;
        }

        .post-card:hover { transform: translateX(5px); border-color: var(--sand); }

        .thumbnail-preview {
            width: 120px;
            height: 80px;
            background-color: var(--sand);
            border-radius: 4px;
            object-fit: cover;
        }

        .post-details h3 { 
            margin: 0 0 5px 0; 
            font-family: 'Playfair Display', serif; 
            color: var(--deep-ocean); 
        }

        .post-meta { font-size: 12px; color: var(--gold-accent); font-weight: 600; }

        .status-tag {
            font-size: 10px;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 3px;
            margin-left: 8px;
        }
        .status-draft { background: #eee; color: #666; }
        .status-published { background: #e3f2fd; color: #1565c0; }

        /* Modal / Editor Restored */
        #edit-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 46, 53, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #edit-modal.open { display: flex; }

        .modal-body {
            background: white;
            width: 95%;
            max-width: 900px;
            max-height: 85vh;
            padding: 40px;
            border-radius: 8px;
            overflow-y: auto;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 8px; color: var(--gold-accent); }
        .input-field { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; font-family: inherit; }

        #editor-container { height: 350px; margin-bottom: 30px; }

        .action-footer { display: flex; justify-content: flex-end; gap: 15px; }
        .secondary-btn { background: none; border: 1px solid var(--sand); color: var(--deep-ocean); padding: 12px 24px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-container">
    <header>
        <h1>La Vista Admin</h1>
        <button class="generate-btn" onclick="triggerGeneration()">+ NEW POST DRAFT</button>
    </header>

    <div id="posts-list">
        </div>
</div>

<div id="edit-modal">
    <div class="modal-body">
        <div class="input-group">
            <label>POST TITLE</label>
            <input type="text" id="edit-title" class="input-field" style="font-family:'Playfair Display'; font-size: 20px;">
        </div>
        
        <div class="input-group">
            <label>FEATURED IMAGE URL</label>
            <input type="text" id="edit-image" class="input-field" placeholder="https://unsplash.com/...">
        </div>

        <div id="editor-container"></div>

        <div class="action-footer">
            <button class="secondary-btn" onclick="closeEdit()">Discard</button>
            <button class="generate-btn" style="background: var(--gold-accent);" onclick="saveEdit('draft')">Save Draft</button>
            <button class="generate-btn" onclick="saveEdit('published')">Publish Live</button>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    let quill = new Quill('#editor-container', { theme: 'snow', modules: { toolbar: [['bold', 'italic'], ['link', 'blockquote'], [{ 'header': 2 }], ['clean']] } });
    let allPosts = [];
    let currentEditingId = null;

    async function fetchPosts() {
        const res = await fetch('/.netlify/functions/blog-posts');
        allPosts = await res.json();
        renderPosts();
    }

    function renderPosts() {
        const list = document.getElementById('posts-list');
        list.innerHTML = allPosts.sort((a,b) => new Date(b.date || b.createdAt) - new Date(a.date || a.createdAt)).map(post => {
            const dateStr = post.date ? new Date(post.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'Pending...';
            return `
            <div class="post-card">
                <img src="${post.displayImage || ''}" class="thumbnail-preview" onerror="this.src='https://via.placeholder.com/120x80?text=Cabo'">
                <div class="post-details">
                    <div class="post-meta">
                        ${dateStr} 
                        <span class="status-tag ${post.status === 'published' ? 'status-published' : 'status-draft'}">${post.status}</span>
                    </div>
                    <h3>${post.title}</h3>
                </div>
                <div>
                    <button class="secondary-btn" onclick="openEditor('${post.id}')">Edit</button>
                </div>
            </div>
        `}).join('');
    }

    function openEditor(postId) {
        const post = allPosts.find(p => p.id === postId);
        currentEditingId = postId;
        document.getElementById('edit-title').value = post.title;
        document.getElementById('edit-image').value = post.displayImage || "";
        
        // Handle markdown or HTML content
        quill.root.innerHTML = post.content.includes('<p>') ? post.content : marked.parse(post.content);
        document.getElementById('edit-modal').classList.add('open');
    }

    function closeEdit() { document.getElementById('edit-modal').classList.remove('open'); }

    async function saveEdit(status) {
        const data = {
            title: document.getElementById('edit-title').value,
            displayImage: document.getElementById('edit-image').value,
            content: quill.root.innerHTML,
            status: status,
            date: new Date().toISOString()
        };

        const password = prompt("Admin Password:");
        await fetch(`/.netlify/functions/blog-posts?password=${password}&id=${currentEditingId}&action=edit`, {
            method: 'POST',
            body: JSON.stringify(data)
        });
        
        closeEdit();
        fetchPosts();
    }

    function triggerGeneration() {
        const password = prompt("Admin Password:");
        window.open(`/.netlify/functions/generate-blog-post?password=${password}`, '_blank');
    }

    fetchPosts();
</script>

</body>
</html>
