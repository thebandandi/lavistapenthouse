<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vista Admin | Blog Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #1a1a1a;
            --gold: #c5a059;
            --bg: #f8f9fa;
            --white: #ffffff;
            --muted: #666666;
            --border: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 20px;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin: 0; }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-publish { background: var(--gold); }
        .btn-delete { background: #dc3545; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        /* Blog Post List */
        .post-card {
            background: var(--white);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .post-info h3 { margin: 0 0 8px 0; font-family: 'Playfair Display', serif; }
        .post-meta { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 10px;
        }
        .status-draft { background: #fff3cd; color: #856404; }
        .status-published { background: #d4edda; color: #155724; }

        /* Modal / Editor */
        #edit-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #edit-modal.open { display: flex; }

        .modal-content {
            background: var(--white);
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            padding: 32px;
            border-radius: 12px;
            overflow-y: auto;
        }

        .edit-title-input, .edit-image-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 18px;
            font-family: 'Playfair Display', serif;
        }

        .edit-image-input { font-size: 14px; font-family: 'Inter', sans-serif; color: var(--muted); }

        #editor-container { height: 400px; margin-bottom: 24px; }
        
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Blog Dashboard</h1>
        <button class="btn" onclick="window.open('/.netlify/functions/generate-blog-post?password=' + prompt('Enter Admin Password:'), '_blank')">
            + Generate New Draft
        </button>
    </header>

    <div id="posts-list">
        <p style="text-align: center; color: var(--muted);">Loading your Cabo stories...</p>
    </div>
</div>

<div id="edit-modal">
    <div class="modal-content">
        <h2 style="font-family: 'Playfair Display', serif; margin-top: 0;">Edit Cabo Update</h2>
        
        <label style="font-size: 11px; font-weight: bold; color: var(--muted);">POST TITLE</label>
        <input type="text" id="edit-title" class="edit-title-input">

        <label style="font-size: 11px; font-weight: bold; color: var(--muted);">FEATURED IMAGE URL (UNSPLASH OR CUSTOM)</label>
        <input type="text" id="edit-image" class="edit-image-input" placeholder="https://images.unsplash.com/...">

        <div id="editor-container"></div>

        <div class="modal-actions">
            <button class="btn" style="background: #6c757d;" onclick="closeEdit()">Cancel</button>
            <button class="btn btn-publish" onclick="saveEdit()">Save Draft</button>
            <button class="btn" style="background: #28a745;" onclick="publishPost()">Publish Live</button>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    let quill = new Quill('#editor-container', { theme: 'snow', modules: { toolbar: [['bold', 'italic'], ['link', 'blockquote'], [{ 'header': 2 }], ['clean']] } });
    let allPosts = [];
    let currentEditingId = null;

    async function fetchPosts() {
        try {
            const res = await fetch('/.netlify/functions/blog-posts');
            allPosts = await res.json();
            renderPosts();
        } catch (e) { console.error("Fetch failed", e); }
    }

    function renderPosts() {
        const list = document.getElementById('posts-list');
        if (allPosts.length === 0) {
            list.innerHTML = `<p style="text-align:center; padding: 40px;">No posts found. Generate your first one!</p>`;
            return;
        }
        list.innerHTML = allPosts.sort((a,b) => new Date(b.date) - new Date(a.date)).map(post => `
            <div class="post-card">
                <div class="post-info">
                    <div class="post-meta">
                        ${new Date(post.date).toLocaleDateString()} 
                        <span class="status-badge ${post.status === 'published' ? 'status-published' : 'status-draft'}">
                            ${post.status.toUpperCase()}
                        </span>
                    </div>
                    <h3>${post.title}</h3>
                </div>
                <div class="post-actions">
                    <button class="btn" onclick="openEditor('${post.id}')">Edit</button>
                    <button class="btn btn-delete" onclick="deletePost('${post.id}')">Delete</button>
                </div>
            </div>
        `).join('');
    }

    function openEditor(postId) {
        const post = allPosts.find(p => p.id === postId);
        currentEditingId = postId;
        document.getElementById('edit-title').value = post.title;
        document.getElementById('edit-image').value = post.displayImage || "";
        
        // Convert markdown or raw text to HTML for Quill
        quill.root.innerHTML = marked.parse(post.content);
        document.getElementById('edit-modal').classList.add('open');
    }

    function closeEdit() {
        document.getElementById('edit-modal').classList.remove('open');
        currentEditingId = null;
    }

    async function saveEdit() {
        const updatedTitle = document.getElementById('edit-title').value;
        const updatedImage = document.getElementById('edit-image').value;
        const updatedContent = quill.root.innerHTML;

        await apiAction('edit', currentEditingId, { 
            title: updatedTitle, 
            content: updatedContent,
            displayImage: updatedImage,
            status: 'draft' 
        });
        closeEdit();
        fetchPosts();
    }

    async function publishPost() {
        const updatedTitle = document.getElementById('edit-title').value;
        const updatedImage = document.getElementById('edit-image').value;
        const updatedContent = quill.root.innerHTML;

        await apiAction('edit', currentEditingId, { 
            title: updatedTitle, 
            content: updatedContent,
            displayImage: updatedImage,
            status: 'published',
            publishedAt: new Date().toISOString()
        });
        closeEdit();
        fetchPosts();
    }

    async function deletePost(postId) {
        if (!confirm("Are you sure? This cannot be undone.")) return;
        await apiAction('delete', postId);
        fetchPosts();
    }

    async function apiAction(type, id, data = {}) {
        const password = prompt("Confirm Admin Password:");
        await fetch(`/.netlify/functions/blog-posts?password=${password}&id=${id}&action=${type}`, {
            method: 'POST',
            body: JSON.stringify(data)
        });
    }

    fetchPosts();
</script>

</body>
</html>
