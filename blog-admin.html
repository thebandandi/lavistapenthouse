<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Admin | La Vista Penthouse</title>
<meta name="robots" content="noindex, nofollow">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>
  :root { --sand:#f5efe6; --warm-white:#faf8f4; --terracotta:#c4714a; --deep-ocean:#1a3a4a; --gold:#c9a84c; --text:#1c1c1c; --muted:#6b6b6b; --border:#e0d8cc; --success:#2d7d46; --error:#c0392b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--warm-white); color:var(--text); }
  nav { background:var(--deep-ocean); padding:16px 48px; display:flex; align-items:center; justify-content:space-between; }
  .nav-logo { font-family:'Cormorant Garamond',serif; font-size:20px; color:#fff; }
  .nav-logo span { color:var(--gold); }
  .nav-tag { font-size:11px; background:var(--terracotta); color:#fff; padding:3px 10px; border-radius:20px; letter-spacing:.06em; text-transform:uppercase; }
  .container { max-width:900px; margin:0 auto; padding:48px 32px; }
  h1 { font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:500; color:var(--deep-ocean); margin-bottom:6px; }
  .subtitle { color:var(--muted); font-size:14px; margin-bottom:32px; }

  /* LOGIN */
  .login-box { max-width:400px; margin:80px auto; background:#fff; border:1px solid var(--border); border-radius:16px; padding:40px; text-align:center; }
  .login-box h2 { font-family:'Cormorant Garamond',serif; font-size:28px; color:var(--deep-ocean); margin-bottom:8px; }
  .login-box p { font-size:13px; color:var(--muted); margin-bottom:24px; }
  .login-input { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:12px 16px; font-family:'DM Sans',sans-serif; font-size:14px; outline:none; margin-bottom:12px; }
  .login-input:focus { border-color:var(--deep-ocean); }
  .login-btn { width:100%; background:var(--deep-ocean); color:#fff; border:none; padding:13px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:background .2s; }
  .login-btn:hover { background:var(--terracotta); }
  .login-error { color:var(--error); font-size:13px; margin-top:8px; display:none; }

  /* TABS */
  .tabs { display:flex; gap:4px; margin-bottom:28px; border-bottom:2px solid var(--border); }
  .tab { padding:10px 20px; font-size:13px; font-weight:500; cursor:pointer; border:none; background:none; color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s; }
  .tab.active { color:var(--deep-ocean); border-bottom-color:var(--deep-ocean); }

  /* POST CARDS */
  .post-list { display:flex; flex-direction:column; gap:16px; }
  .post-item { background:#fff; border:1px solid var(--border); border-radius:12px; padding:24px; display: flex; gap: 20px; align-items: start; }
  .post-item-img { width: 120px; height: 120px; border-radius: 8px; object-fit: cover; background: var(--sand); flex-shrink: 0; }
  .post-item-content { flex-grow: 1; }
  .post-item-header { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:10px; }
  .post-item-title { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:500; color:var(--deep-ocean); line-height:1.3; }
  .post-item-meta { font-size:12px; color:var(--muted); margin-bottom:8px; }
  .post-item-excerpt { font-size:13px; color:#444; line-height:1.6; margin-bottom:16px; }
  .post-actions { display:flex; gap:10px; flex-wrap:wrap; }
  .btn { padding:9px 20px; border-radius:6px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; border:none; transition:all .2s; }
  .btn-publish { background:var(--success); color:#fff; }
  .btn-edit { background:var(--deep-ocean); color:#fff; }
  .btn-delete { background:none; color:var(--error); border:1.5px solid var(--error); }
  .btn-unpublish { background:none; color:var(--muted); border:1.5px solid var(--border); }
  .status-badge { font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; padding:3px 10px; border-radius:20px; flex-shrink:0; }
  .badge-draft { background:#fff3cd; color:#856404; }
  .badge-published { background:#d4edda; color:var(--success); }

  /* MODALS & EDITOR */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:500; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:#fff; border-radius:16px; padding:30px; max-width:850px; width:100%; max-height:90vh; overflow-y:auto; position: relative; }
  .modal-close { position: absolute; top: 15px; right: 20px; background:none; border:none; font-size:28px; cursor:pointer; color:var(--muted); }
  #editor-container { height: 400px; margin-bottom: 20px; border-radius: 8px; }
  .edit-title-input { width: 100%; padding: 12px; font-size: 20px; font-family: 'Cormorant Garamond', serif; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; }

  .generate-section { background:var(--sand); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:28px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  .btn-generate { background:var(--deep-ocean); color:#fff; padding:11px 24px; border-radius:6px; border:none; cursor:pointer; font-weight:500; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:12px 24px; border-radius:8px; font-size:14px; z-index:9999; opacity:0; transition:opacity .3s; pointer-events:none; }
  .toast.show { opacity:1; }
  .toast.success { background:var(--success); color:#fff; }
  .toast.error { background:var(--error); color:#fff; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">La Vista <span>Penthouse</span></div>
  <span class="nav-tag">Blog Admin</span>
</nav>

<div id="login-section">
  <div class="login-box">
    <h2>Admin Login</h2>
    <p>Enter your admin key to manage blog posts.</p>
    <input type="password" class="login-input" id="admin-key-input" placeholder="Admin key" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Sign In</button>
    <p class="login-error" id="login-error">Incorrect admin key.</p>
  </div>
</div>

<div id="admin-panel" style="display:none;">
  <div class="container">
    <h1>Blog Manager</h1>
    <p class="subtitle">Review, edit, and publish AI-generated content.</p>

    <div class="generate-section">
      <div>
        <strong style="font-size:14px;">Automation: Active</strong>
        <p>New drafts generate every Monday. Click below for an extra one.</p>
      </div>
      <button class="btn-generate" id="gen-btn" onclick="generatePost()">✨ Generate Extra Draft</button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('drafts',this)">Drafts <span id="draft-count"></span></button>
      <button class="tab" onclick="switchTab('published',this)">Published <span id="pub-count"></span></button>
    </div>

    <div id="drafts-panel"><div class="post-list" id="drafts-list"></div></div>
    <div id="published-panel" style="display:none;"><div class="post-list" id="published-list"></div></div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeEdit()">×</button>
    <h2 style="margin-bottom:15px; font-family:'Cormorant Garamond',serif;">Edit Blog Post</h2>
    <input type="text" id="edit-title" class="edit-title-input">
    <div id="editor-container"></div>
    <div class="post-actions">
        <button class="btn btn-publish" onclick="saveEdit()">💾 Save Changes</button>
        <button class="btn btn-preview" onclick="closeEdit()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
let adminKey = '';
let allPosts = [];
let currentEditingId = null;

// Initialize Quill
const quill = new Quill('#editor-container', {
  theme: 'snow',
  modules: {
    toolbar: [
      [{ 'header': [1, 2, false] }],
      ['bold', 'italic', 'underline', 'link'],
      [{ 'list': 'ordered'}, { 'list': 'bullet' }],
      ['clean']
    ]
  }
});

async function login() {
  const key = document.getElementById('admin-key-input').value.trim();
  if (!key) return;
  try {
    const res = await fetch(`/.netlify/functions/blog-posts?admin=true&password=${key}`);
    const data = await res.json();
    if (data.error || res.status === 401) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    adminKey = key;
    sessionStorage.setItem('lvp_admin', key);
    showAdmin();
  } catch {
    document.getElementById('login-error').style.display = 'block';
  }
}

function showAdmin() {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  loadAllPosts();
}

window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('lvp_admin');
  if (saved) { adminKey = saved; showAdmin(); }
});

async function loadAllPosts() {
  try {
    const res = await fetch(`/.netlify/functions/blog-posts?admin=true&password=${adminKey}`);
    const posts = await res.json();
    allPosts = posts || [];
    renderLists();
  } catch {
    showToast('Could not load posts', 'error');
  }
}

function renderLists() {
  const drafts = allPosts.filter(p => p.status === 'draft');
  const published = allPosts.filter(p => p.status === 'published');
  
  document.getElementById('draft-count').textContent = `(${drafts.length})`;
  document.getElementById('pub-count').textContent = `(${published.length})`;
  
  renderPostList('drafts-list', drafts, 'draft');
  renderPostList('published-list', published, 'published');
}

function renderPostList(containerId, posts, type) {
  const el = document.getElementById(containerId);
  if (!posts.length) {
    el.innerHTML = `<p style="padding:20px; color:gray;">No ${type} posts found.</p>`;
    return;
  }
  
  el.innerHTML = posts.map(post => {
    // FIX: This looks for the image in every possible place the AI might have saved it
    const thumbUrl = post.displayImage || 
                     (post.image && post.image.url) || 
                     (post.image && post.image.thumb) || 
                     '/images/default-blog.jpg';

    return `
    <div class="post-item">
      <img class="post-item-img" src="${thumbUrl}" alt="Thumbnail" onerror="this.src='/images/default-blog.jpg'">
      <div class="post-item-content">
        <div class="post-item-header">
          <div class="post-item-title">${post.title}</div>
          <span class="status-badge ${type === 'draft' ? 'badge-draft' : 'badge-published'}">${type}</span>
        </div>
        <div class="post-item-meta">${fmtDate(post.date || post.createdAt)}</div>
        <div class="post-actions">
          <button class="btn btn-edit" onclick="openEdit('${post.id}')">✏️ Edit</button>
          ${type === 'draft' ? 
            `<button class="btn btn-publish" onclick="apiAction('publish', '${post.id}')">✅ Publish</button>` : 
            `<button class="btn btn-unpublish" onclick="apiAction('unpublish', '${post.id}')">↩ Unpublish</button>`
          }
          <button class="btn btn-delete" onclick="deletePost('${post.id}')">🗑 Delete</button>
        </div>
      </div>
    </div>`}).join('');
}
function fmtDate(iso) { return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }

function openEdit(postId) {
    const post = allPosts.find(p => p.id === postId);
    if (!post) return;
    currentEditingId = postId;
    document.getElementById('edit-title').value = post.title;
    quill.root.innerHTML = post.content;
    document.getElementById('edit-modal').classList.add('open');
}

function closeEdit() {
    document.getElementById('edit-modal').classList.remove('open');
}

async function saveEdit() {
    const updatedTitle = document.getElementById('edit-title').value;
    const updatedContent = quill.root.innerHTML;

    await apiAction('edit', currentEditingId, { updatedTitle, updatedContent });
    closeEdit();
}

async function deletePost(postId) {
    if(confirm('Delete forever?')) await apiAction('delete', postId);
}

async function apiAction(action, postId, extraData = {}) {
  try {
      const res = await fetch('/.netlify/functions/blog-posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, postId, password: adminKey, ...extraData })
      });
      if (res.ok) {
          showToast(`Post ${action}ed successfully`, 'success');
          loadAllPosts();
      } else {
          showToast('Action failed', 'error');
      }
  } catch (err) {
      showToast('Error connecting to server', 'error');
  }
}

async function generatePost() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true; btn.innerText = 'Generating...';
  try {
    const res = await fetch('/.netlify/functions/generate-blog-post', { 
        method: 'POST',
        body: JSON.stringify({ password: adminKey })
    });
    if(res.ok) {
        showToast('Draft Created!', 'success');
        loadAllPosts();
    }
  } finally { btn.disabled = false; btn.innerText = '✨ Generate Extra Draft'; }
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('drafts-panel').style.display = tab === 'drafts' ? 'block' : 'none';
  document.getElementById('published-panel').style.display = tab === 'published' ? 'block' : 'none';
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
