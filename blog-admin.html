<!DOCTYPE html>
<html>
<head><title>Database Audit</title></head>
<body style="font-family: sans-serif; padding: 40px; background: #f4f4f4;">
    <h1>Database Audit: Total Records Found</h1>
    <p>This page shows raw data. If the Gemini posts are in the database, they WILL appear here.</p>
    <div id="audit-list">Scanning...</div>

    <script>
        async function audit() {
            const list = document.getElementById('audit-list');
            try {
                const res = await fetch('/.netlify/functions/blog-posts');
                const posts = await res.json();
                
                if (!posts || posts.length === 0) {
                    list.innerHTML = "<h3>The database is empty.</h3>";
                    return;
                }

                list.innerHTML = `<h3>Total Posts Found: ${posts.length}</h3>` + posts.map(p => `
                    <div style="background: white; border: 2px solid #ccc; padding: 15px; margin-bottom: 10px;">
                        <p><strong>Title:</strong> ${p.title || 'NULL'}</p>
                        <p><strong>Status Field:</strong> ${p.status || 'MISSING'}</p>
                        <p><strong>ID:</strong> ${p.id || 'MISSING'}</p>
                        <p><strong>Raw Date:</strong> ${p.date || p.createdAt || 'MISSING'}</p>
                        <details>
                            <summary>View Content Preview</summary>
                            <pre style="background: #eee; padding: 10px;">${p.content ? p.content.substring(0, 100) : 'EMPTY'}</pre>
                        </details>
                    </div>
                `).join('');
            } catch (err) {
                list.innerHTML = "Error: " + err.message;
            }
        }
        audit();
    </script>
</body>
</html>
