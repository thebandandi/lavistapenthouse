<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vista Admin | Penthouse Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --sand: #d6c9b1; --warm-white: #faf9f6; --deep-ocean: #1a2e35; --gold: #c5a059; }
        body { font-family: 'Inter', sans-serif; background: var(--warm-white); margin: 0; padding: 40px 20px; color: #2c2c2c; }
        .admin-container { max-width: 1100px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; border: 1px solid #e8e4dc; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--sand); padding-bottom: 20px; margin-bottom: 30px; }
        h1 { font-family: 'Playfair Display', serif; color: var(--deep-ocean); font-size: 2.2rem; margin: 0; }
        
        /* Tabs Original Style */
        .tabs { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #eee; }
        .tab { padding: 10px 20px; cursor: pointer; font-weight: 600; color: #888; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab.active { color: var(--deep-ocean); border-bottom-color: var(--gold); }

        .btn { background: var(--deep-ocean); color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .btn:hover { background: var(--gold); }

        /* Original Card Design */
        .post-card { display: grid; grid-template-columns: 150px 1fr auto; gap: 25px; padding: 25px; border: 1px solid #f0f0f0; border-radius: 8px; margin-bottom: 15px; align-items: center; background: #fff; }
        .post-thumb { width: 150px; height: 100px; object-fit: cover; border-radius: 4px; background: var(--sand); }
        .post-info h3 { font-family: 'Playfair Display', serif; color: var(--deep-ocean); margin: 0 0 10px 0; font-size: 1.5rem; }
        .meta { font-size: 11px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* Modal Original Style */
        #edit-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 46, 53, 0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 900px; padding: 40px; border-radius: 12px; max-height: 90vh; overflow-y: auto; }
        #editor-container { height: 400px; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 10px; font-weight: 800; color: var(--gold); margin-bottom: 8px; }
        .input-field { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="admin-container">
    <header>
        <h1>La Vista Admin</h1>
        <button class="btn" onclick="generateNew()">+ New Update</button>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('draft')">DRAFTS</div>
        <div class="tab" onclick="switchTab('published')">PUBLISHED</div>
    </div>

    <div id="posts-list">
        </div>
</div>

<div id="edit-modal">
    <div class="modal-content">
        <div class="input-group">
            <label>TITLE</label>
            <input type="text" id="edit-title" class="input-field" style="font-family: 'Playfair Display'; font-size: 24px;">
        </div>
        <div class="input-group">
            <label>IMAGE URL</label>
            <input type="text" id="edit-image" class="input-field">
        </div>
        <div id="editor-container"></div>
        <div style="text-align: right; display: flex; justify-content: flex-end; gap: 10px;">
            <button class="btn" style="background: #999;" onclick="closeModal()">Cancel</button>
            <button class="btn" style="background: var(--gold);" onclick="saveAction('draft')">Save Draft</button>
            <button class="btn" onclick="saveAction('published')">Publish Live</button>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
<script>
    const quill = new Quill('#editor-container', { theme: 'snow' });
    let allPosts = [];
    let currentTab = 'draft';
    let activeId = null;

    async function load() {
        try {
            const res = await fetch('/.netlify/functions/blog-posts');
            allPosts = await res.json();
            render();
        } catch (e) { document.getElementById('posts-list').innerHTML = "Error loading database."; }
    }

    function render() {
        const list = document.getElementById('posts-list');
        const filtered = allPosts.filter(p => (p.status || 'draft') === currentTab);
        
        if (filtered.length === 0) {
            list.innerHTML = `<p style="text-align:center; padding: 40px; color: var(--sand);">No ${currentTab}s found.</p>`;
            return;
        }

        list.innerHTML = filtered.sort((a,b) => new Date(b.date || b.createdAt) - new Date(a.date || a.createdAt)).map(p => `
            <div class="post-card">
                <img class="post-thumb" src="${p.displayImage || ''}" onerror="this.src='https://via.placeholder.com/150x100?text=La+Vista'">
                <div class="post-info">
                    <div class="meta">${new Date(p.date || p.createdAt).toLocaleDateString('en-US', {month:'short', day:'numeric'})}</div>
                    <h3>${p.title || 'Untitled'}</h3>
                </div>
                <button class="btn" style="background: var(--sand); color: var(--deep-ocean);" onclick="openModal('${p.id}')">Edit</button>
            </div>
        `).join('');
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.innerText.toLowerCase() === t));
        render();
    }

    function openModal(id) {
        activeId = id;
        const post = allPosts.find(p => p.id === id);
        document.getElementById('edit-title').value = post.title || "";
        document.getElementById('edit-image').value = post.displayImage || "";
        quill.root.innerHTML = post.content.includes('<p>') ? post.content : marked.parse(post.content || "");
        document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

    async function saveAction(status) {
        const password = prompt("Admin Password:");
        const payload = {
            title: document.getElementById('edit-title').value,
            displayImage: document.getElementById('edit-image').value,
            content: quill.root.innerHTML,
            status: status,
            date: new Date().toISOString()
        };
        await fetch(`/.netlify/functions/blog-posts?password=${password}&id=${activeId}&action=edit`, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        closeModal();
        load();
    }

    function generateNew() {
        const password = prompt("Admin Password:");
        if(password) window.open(`/.netlify/functions/generate-blog-post?password=${password}`, '_blank');
    }

    load();
</script>
</body>
</html>
