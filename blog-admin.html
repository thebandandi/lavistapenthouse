<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>La Vista Admin | Full Restoration</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --sand: #d6c9b1; --warm-white: #faf9f6; --deep-ocean: #1a2e35; --gold: #c5a059; }
        body { font-family: 'Inter', sans-serif; background: var(--warm-white); margin: 0; padding: 40px 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; border: 1px solid #e8e4dc; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--sand); padding-bottom: 20px; margin-bottom: 20px; }
        h1 { font-family: 'Playfair Display'; color: var(--deep-ocean); margin: 0; }
        .tabs { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid #eee; }
        .tab { padding: 10px 20px; cursor: pointer; font-weight: 600; color: #888; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--deep-ocean); border-bottom-color: var(--gold); }
        .btn { background: var(--deep-ocean); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        .post-card { display: flex; gap: 20px; padding: 15px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; align-items: center; background: white; }
        .post-thumb { width: 100px; height: 70px; object-fit: cover; border-radius: 4px; background: #eee; }
        .post-info { flex: 1; }
        .meta { font-size: 10px; font-weight: 700; color: var(--gold); }
        #edit-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; width: 90%; max-width: 800px; border-radius: 12px; max-height: 90vh; overflow-y: auto; }
        #editor-container { height: 300px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="admin-container">
    <header>
        <h1>La Vista Admin</h1>
        <button class="btn" onclick="generateNew()">+ New Draft</button>
    </header>

    <div class="tabs">
        <div id="tab-draft" class="tab active" onclick="switchTab('draft')">DRAFTS</div>
        <div id="tab-published" class="tab" onclick="switchTab('published')">PUBLISHED</div>
    </div>

    <div id="posts-list">Loading 65 items...</div>
</div>

<div id="edit-modal">
    <div class="modal-content">
        <h2 id="modal-title-label" style="font-family: 'Playfair Display'; margin-top: 0;">Edit Post</h2>
        <input type="text" id="edit-title" placeholder="Title" style="width:100%; padding:10px; margin-bottom:10px; font-size:18px;">
        <input type="text" id="edit-image" placeholder="Image URL" style="width:100%; padding:10px; margin-bottom:10px;">
        <div id="editor-container"></div>
        <div style="text-align: right; display: flex; justify-content: flex-end; gap: 10px;">
            <button class="btn" style="background:#888" onclick="closeModal()">Cancel</button>
            <button class="btn" style="background:#e74c3c" onclick="deletePost()">Delete</button>
            <button class="btn" style="background:var(--gold)" onclick="savePost('draft')">Save Draft</button>
            <button class="btn" onclick="savePost('published')">Publish Live</button>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
<script>
    const quill = new Quill('#editor-container', { theme: 'snow' });
    let allPosts = [];
    let currentTab = 'draft';
    let activeId = null;

    async function load() {
        try {
            const res = await fetch('/.netlify/functions/blog-posts');
            allPosts = await res.json();
            render();
        } catch (e) { document.getElementById('posts-list').innerHTML = "Connection Error."; }
    }

    function render() {
        const list = document.getElementById('posts-list');
        // Logic: if status isn't 'published', it's a draft.
        const filtered = allPosts.filter(p => {
            const s = (p.status || 'draft').toLowerCase();
            return currentTab === 'published' ? s === 'published' : s !== 'published';
        });

        if (filtered.length === 0) {
            list.innerHTML = `<p style="text-align:center; padding:20px;">No ${currentTab} items found.</p>`;
            return;
        }

        list.innerHTML = filtered.sort((a,b) => new Date(b.date || b.createdAt || 0) - new Date(a.date || a.createdAt || 0)).map(p => `
            <div class="post-card">
                <img class="post-thumb" src="${p.displayImage || ''}" onerror="this.src='https://via.placeholder.com/100x70?text=Cabo'">
                <div class="post-info">
                    <div class="meta">${new Date(p.date || p.createdAt).toLocaleDateString('en-US', {month:'short', day:'numeric'})}</div>
                    <h3 style="margin:5px 0; font-family:'Playfair Display';">${p.title || 'Untitled'}</h3>
                </div>
                <button class="btn" style="background:var(--sand); color:#1a2e35;" onclick="openEdit('${p.id}')">Edit</button>
            </div>
        `).join('');
    }

    function switchTab(t) {
        currentTab = t;
        document.getElementById('tab-draft').classList.toggle('active', t === 'draft');
        document.getElementById('tab-published').classList.toggle('active', t === 'published');
        render();
    }

    function openEdit(id) {
        activeId = id;
        const post = allPosts.find(p => p.id === id);
        document.getElementById('edit-title').value = post.title || "";
        document.getElementById('edit-image').value = post.displayImage || "";
        quill.root.innerHTML = (post.content || "").includes('<p>') ? post.content : (window.marked ? marked.parse(post.content || "") : post.content);
        document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

    async function savePost(status) {
        const password = prompt("Admin Password:");
        const payload = { title: document.getElementById('edit-title').value, displayImage: document.getElementById('edit-image').value, content: quill.root.innerHTML, status: status, date: new Date().toISOString() };
        await fetch(`/.netlify/functions/blog-posts?password=${password}&id=${activeId}&action=edit`, { method: 'POST', body: JSON.stringify(payload) });
        closeModal(); load();
    }

    async function deletePost() {
        if (!confirm("Delete forever?")) return;
        const password = prompt("Admin Password:");
        await fetch(`/.netlify/functions/blog-posts?password=${password}&id=${activeId}&action=delete`, { method: 'POST' });
        closeModal(); load();
    }

    function generateNew() {
        const password = prompt("Admin Password:");
        if(password) window.open(`/.netlify/functions/generate-blog-post?password=${password}`, '_blank');
    }

    load();
</script>
</body>
</html>
