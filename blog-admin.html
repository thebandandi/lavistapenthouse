<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vista Admin | Penthouse Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --sand: #d6c9b1;
            --warm-white: #faf9f6;
            --deep-ocean: #1a2e35;
            --gold: #c5a059;
            --text: #2c2c2c;
            --border: #e8e4dc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--warm-white);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
        }

        .admin-container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(26, 46, 53, 0.05);
            border: 1px solid var(--border);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--sand);
            padding-bottom: 25px;
            margin-bottom: 30px;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--deep-ocean); margin: 0; }

        .tabs { display: flex; gap: 30px; margin-bottom: 30px; border-bottom: 1px solid #eee; }
        .tab { 
            padding: 10px 0; 
            cursor: pointer; 
            font-weight: 600; 
            color: #888; 
            border-bottom: 3px solid transparent; 
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .tab.active { color: var(--deep-ocean); border-bottom-color: var(--gold); }

        .btn {
            background: var(--deep-ocean);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .btn:hover { background: var(--gold); transform: translateY(-1px); }

        .post-card {
            display: grid;
            grid-template-columns: 150px 1fr auto;
            gap: 25px;
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #f0f0f0;
            align-items: center;
            transition: all 0.3s ease;
        }

        .post-card:hover { border-color: var(--sand); transform: translateY(-2px); }

        .thumb-box {
            width: 150px;
            height: 100px;
            border-radius: 4px;
            overflow: hidden;
            background: var(--sand);
        }

        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }

        .post-details h3 { font-family: 'Playfair Display', serif; margin: 0 0 10px 0; color: var(--deep-ocean); font-size: 1.6rem; }
        .post-meta { font-size: 11px; color: var(--gold); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }

        #edit-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 46, 53, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-body {
            background: white;
            width: 90%;
            max-width: 950px;
            max-height: 90vh;
            padding: 40px;
            border-radius: 12px;
            overflow-y: auto;
        }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
        .input-field { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 4px; font-size: 16px; box-sizing: border-box; }

        #editor-container { height: 400px; margin-bottom: 30px; background: white; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 15px; border-top: 1px solid #eee; padding-top: 25px; }
    </style>
</head>
<body>

<div class="admin-container">
    <header>
        <h1>La Vista Admin</h1>
        <button class="btn" onclick="generateNew()">+ New Update</button>
    </header>

    <div class="tabs">
        <div id="tab-draft" class="tab active" onclick="switchTab('draft')">Drafts</div>
        <div id="tab-published" class="tab" onclick="switchTab('published')">Published</div>
    </div>

    <div id="posts-list">
        <p style="text-align: center; color: var(--gold);">Refreshing the gallery...</p>
    </div>
</div>

<div id="edit-modal">
    <div class="modal-body">
        <h2 style="font-family: 'Playfair Display'; margin-top: 0; color: var(--deep-ocean);">Edit Cabo Post</h2>
        
        <div class="input-group">
            <label>POST TITLE</label>
            <input type="text" id="edit-title" class="input-field" style="font-family: 'Playfair Display'; font-size: 24px;">
        </div>

        <div class="input-group">
            <label>FEATURED IMAGE URL</label>
            <input type="text" id="edit-image" class="input-field">
        </div>

        <div id="editor-container"></div>

        <div class="modal-footer">
            <button class="btn" style="background: #888;" onclick="closeModal()">Cancel</button>
            <button class="btn" style="background: #c0392b;" onclick="deletePost()">Delete</button>
            <button class="btn" style="background: var(--gold);" onclick="saveAction('draft')">Save Draft</button>
            <button class="btn" onclick="saveAction('published')">Publish Live</button>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
<script>
    const quill = new Quill('#editor-container', { theme: 'snow' });
    let allPosts = [];
    let currentTab = 'draft';
    let activeId = null;

    async function loadData() {
        try {
            const res = await fetch('/.netlify/functions/blog-posts');
            allPosts = await res.json();
            renderList();
        } catch (e) { document.getElementById('posts-list').innerHTML = "Portal offline."; }
    }

    function renderList() {
        const listEl = document.getElementById('posts-list');
        const filtered = allPosts.filter(p => {
            const s = (p.status || 'draft').toLowerCase();
            return currentTab === 'published' ? s === 'published' : s !== 'published';
        });

        if (filtered.length === 0) {
            listEl.innerHTML = `<p style="text-align:center; padding: 40px; color: var(--sand);">No ${currentTab} entries found.</p>`;
            return;
        }

        listEl.innerHTML = filtered.sort((a,b) => new Date(b.date || b.createdAt || 0) - new Date(a.date || a.createdAt || 0)).map(p => {
            // HYBRID IMAGE LOGIC: Handles old Claude and new Gemini structures
            const thumbUrl = p.displayImage || 
                             (p.image && p.image.url) || 
                             (p.image && p.image.thumb) || 
                             '/images/default-blog.jpg';

            return `
                <div class="post-card">
                    <div class="thumb-box">
                        <img src="${thumbUrl}" onerror="this.src='https://via.placeholder.com/150x100?text=Cabo'">
                    </div>
                    <div class="post-details">
                        <div class="post-meta">${new Date(p.date || p.createdAt).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})}</div>
                        <h3>${p.title || 'Untitled Update'}</h3>
                    </div>
                    <button class="btn" style="background: var(--sand); color: var(--deep-ocean);" onclick="openEdit('${p.id}')">EDIT</button>
                </div>
            `;
        }).join('');
    }

    function switchTab(t) {
        currentTab = t;
        document.getElementById('tab-draft').classList.toggle('active', t === 'draft');
        document.getElementById('tab-published').classList.toggle('active', t === 'published');
        renderList();
    }

    function openEdit(id) {
        activeId = id;
        const post = allPosts.find(p => p.id === id);
        document.getElementById('edit-title').value = post.title || "";
        
        // Ensure the editor gets the correct image path back too
        const thumbUrl = post.displayImage || (post.image && post.image.url) || "";
        document.getElementById('edit-image').value = thumbUrl;
        
        const content = post.content || "";
        quill.root.innerHTML = content.includes('<p>') ? content : (window.marked ? marked.parse(content) : content);
        document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

    async function saveAction(status) {
        const password = prompt("Admin Password:");
        if(!password) return;
        const payload = {
            title: document.getElementById('edit-title').value,
            displayImage: document.getElementById('edit-image').value,
            content: quill.root.innerHTML,
            status: status,
            date: new Date().toISOString()
        };
        await fetch(`/.netlify/functions/blog-posts?password=${password}&id=${activeId}&action=edit`, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        closeModal();
        loadData();
    }

    async function deletePost() {
        if (!confirm("Permanently delete this post?")) return;
        const password = prompt("Admin Password:");
        await fetch(`/.netlify/functions/blog-posts?password=${password}&id=${activeId}&action=delete`, { method: 'POST' });
        closeModal();
        loadData();
    }

    function generateNew() {
        const password = prompt("Admin Password:");
        if(password) window.open(`/.netlify/functions/generate-blog-post?password=${password}`, '_blank');
    }

    loadData();
</script>
</body>
</html>
