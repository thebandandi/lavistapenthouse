<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Admin — La Vista Penthouse</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --sand:#f5efe6; --warm-white:#faf8f4; --terracotta:#c4714a; --deep-ocean:#1a3a4a; --gold:#c9a84c; --text:#1c1c1c; --muted:#6b6b6b; --border:#e0d8cc; --success:#2d7d46; --error:#c0392b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--warm-white); color:var(--text); min-height:100vh; }
  .admin-header { background:var(--deep-ocean); padding:20px 48px; display:flex; align-items:center; justify-content:space-between; }
  .admin-header h1 { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:500; color:#fff; }
  .admin-header a { color:rgba(255,255,255,.6); font-size:13px; text-decoration:none; }
  .admin-header a:hover { color:#fff; }
  .login-wrap { max-width:400px; margin:80px auto; padding:40px; background:#fff; border-radius:16px; border:1px solid var(--border); box-shadow:0 4px 24px rgba(0,0,0,.06); }
  .login-wrap h2 { font-family:'Cormorant Garamond',serif; font-size:28px; color:var(--deep-ocean); margin-bottom:8px; }
  .login-wrap p { font-size:14px; color:var(--muted); margin-bottom:24px; }
  input[type=password] { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:12px 16px; font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border .15s; }
  input[type=password]:focus { border-color:var(--deep-ocean); }
  .btn-primary { width:100%; padding:13px; background:var(--deep-ocean); color:#fff; border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; margin-top:12px; transition:background .2s; }
  .btn-primary:hover { background:var(--terracotta); }
  .btn-publish { background:var(--success); color:#fff; border:none; padding:10px 24px; border-radius:6px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:opacity .2s; }
  .btn-publish:hover { opacity:.85; }
  .btn-delete { background:none; color:var(--error); border:1.5px solid var(--error); padding:10px 20px; border-radius:6px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all .2s; }
  .btn-delete:hover { background:var(--error); color:#fff; }
  .container { max-width:900px; margin:0 auto; padding:48px; }
  .section-title { font-family:'Cormorant Garamond',serif; font-size:28px; color:var(--deep-ocean); margin-bottom:24px; }
  .draft-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:28px; margin-bottom:20px; }
  .draft-card h3 { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--deep-ocean); margin-bottom:6px; }
  .draft-meta { font-size:12px; color:var(--muted); margin-bottom:12px; }
  .draft-excerpt { font-size:14px; color:#3a3a3a; line-height:1.7; margin-bottom:16px; }
  .draft-preview { background:var(--sand); border-radius:8px; padding:16px; margin-bottom:16px; max-height:200px; overflow-y:auto; font-size:13px; line-height:1.7; color:#3a3a3a; }
  .draft-preview h3 { font-size:15px; margin:12px 0 6px; }
  .draft-actions { display:flex; gap:12px; align-items:center; }
  .tag-chip { background:var(--sand); color:var(--terracotta); font-size:11px; padding:2px 8px; border-radius:12px; font-weight:500; }
  .tags-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-state h3 { font-family:'Cormorant Garamond',serif; font-size:24px; color:var(--deep-ocean); margin-bottom:8px; }
  .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); padding:12px 24px; border-radius:8px; font-size:14px; z-index:999; opacity:0; transition:opacity .3s; pointer-events:none; }
  .toast.success { background:var(--success); color:#fff; }
  .toast.error { background:var(--error); color:#fff; }
  .toast.show { opacity:1; }
  .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:36px; }
  .stat-card { background:#fff; border:1px solid var(--border); border-radius:10px; padding:20px; text-align:center; }
  .stat-card strong { display:block; font-size:28px; font-weight:500; color:var(--deep-ocean); }
  .stat-card span { font-size:13px; color:var(--muted); }
  @media(max-width:700px) { .container{padding:24px} .admin-header{padding:16px 24px} .stats-row{grid-template-columns:1fr 1fr} }
</style>
</head>
<body>

<div class="admin-header">
  <h1>Blog Admin Panel</h1>
  <a href="/">← Back to site</a>
</div>

<div id="app">
  <!-- Login screen shown by default -->
  <div class="login-wrap" id="login-screen">
    <h2>Admin Login</h2>
    <p>Enter your admin password to review and publish blog drafts.</p>
    <input type="password" id="pwd-input" placeholder="Admin password" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-primary" onclick="login()">Sign in</button>
    <div id="login-error" style="color:#c0392b;font-size:13px;margin-top:10px;display:none;">Incorrect password. Please try again.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let adminPwd = "";

function login() {
  const pwd = document.getElementById("pwd-input").value;
  if (!pwd) return;
  adminPwd = pwd;
  loadDrafts(pwd);
}

async function loadDrafts(pwd) {
  try {
    const [draftRes, pubRes] = await Promise.all([
      fetch(`/api/blog-posts?drafts=1&password=${encodeURIComponent(pwd)}`),
      fetch("/api/blog-posts")
    ]);
    if (draftRes.status === 401) {
      document.getElementById("login-error").style.display = "block";
      adminPwd = "";
      return;
    }
    const drafts = await draftRes.json();
    const published = await pubRes.json();
    renderDashboard(drafts, published);
  } catch (e) {
    showToast("Error loading posts", "error");
  }
}

function renderDashboard(drafts, published) {
  const app = document.getElementById("app");

  const draftCards = drafts.length
    ? drafts.map(post => `
        <div class="draft-card" id="card-${post.id}">
          ${post.image
            ? `<div style="display:grid;grid-template-columns:200px 1fr;gap:20px;margin-bottom:16px;align-items:start;">
                <div>
                  <img src="${post.image.thumb}" alt="${post.image.alt}" style="width:100%;height:130px;object-fit:cover;border-radius:8px;display:block;">
                  <p style="font-size:10px;color:var(--muted);margin-top:4px;text-align:center;">Photo by ${post.image.photographer} · Unsplash</p>
                </div>
                <div>
                  <div class="tags-row">${(post.tags||[]).map(t=>`<span class="tag-chip">${t}</span>`).join("")}</div>
                  <h3>${post.title}</h3>
                  <div class="draft-meta">Generated ${new Date(post.createdAt).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})} · Topic: ${post.topic}</div>
                  <div class="draft-excerpt">${post.excerpt}</div>
                </div>
              </div>`
            : `<div>
                <div class="tags-row">${(post.tags||[]).map(t=>`<span class="tag-chip">${t}</span>`).join("")}</div>
                <h3>${post.title}</h3>
                <div class="draft-meta">Generated ${new Date(post.createdAt).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})} · Topic: ${post.topic} · No image</div>
                <div class="draft-excerpt">${post.excerpt}</div>
              </div>`
          }
          <details style="margin-bottom:12px;">
            <summary style="cursor:pointer;font-size:13px;color:var(--muted);margin-bottom:8px;">Preview full post text</summary>
            <div class="draft-preview">${post.content}</div>
          </details>
          <details style="margin-bottom:12px;">
            <summary style="cursor:pointer;font-size:13px;color:var(--muted);margin-bottom:8px;">📰 News headlines used (${(post.headlinesUsed||[]).length} found)</summary>
            <div style="background:#f0f7ff;border-radius:8px;padding:12px 16px;font-size:12px;line-height:1.8;color:#333;max-height:160px;overflow-y:auto;white-space:pre-wrap;">${(post.headlinesUsed||[]).length > 0 ? post.headlinesUsed.join('\n') : 'No headlines fetched — Claude used general knowledge.'}</div>
          </details>
          <details style="margin-bottom:16px;">
            <summary style="cursor:pointer;font-size:13px;color:var(--muted);margin-bottom:8px;">🤖 Prompt sent to Claude</summary>
            <div style="background:#fafafa;border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:11px;line-height:1.7;color:#555;max-height:200px;overflow-y:auto;white-space:pre-wrap;font-family:monospace;">${(post.promptUsed||'Prompt not recorded for this post.').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
          </details>
          <div class="draft-actions">
            <button class="btn-publish" onclick="publishPost('${post.id}', this)">✓ Publish</button>
            <button class="btn-delete" onclick="deletePost('${post.id}', this, 'draft')">✕ Delete</button>
          </div>
        </div>`).join("")
    : `<div class="empty-state"><h3>No drafts pending</h3><p>New blog posts are generated automatically. Check back tomorrow or trigger a manual generation.</p></div>`;

  const publishedCards = published.length
    ? published.map(post => `
        <div class="draft-card" id="card-${post.id}" style="border-left:4px solid var(--success);">
          <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;">
            ${post.image ? `<img src="${post.image.thumb}" alt="" style="width:80px;height:56px;object-fit:cover;border-radius:6px;flex-shrink:0;">` : ''}
            <div style="flex:1;">
              <h3 style="font-family:Cormorant Garamond,serif;font-size:18px;color:var(--deep-ocean);margin-bottom:4px;">${post.title}</h3>
              <div style="font-size:12px;color:var(--muted);">Published ${new Date(post.publishedAt).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})} · <a href="/blog.html?post=${post.id}" target="_blank" style="color:var(--terracotta);">View live →</a></div>
            </div>
            <button class="btn-delete" onclick="deletePost('${post.id}', this, 'published')" style="flex-shrink:0;">✕ Delete</button>
          </div>
        </div>`).join("")
    : `<div style="font-size:14px;color:var(--muted);padding:20px 0;">No published posts yet.</div>`;

  app.innerHTML = `
    <div class="container">
      <div class="stats-row">
        <div class="stat-card"><strong>${drafts.length}</strong><span>Pending drafts</span></div>
        <div class="stat-card"><strong>${published.length}</strong><span>Published posts</span></div>
        <div class="stat-card"><strong>Daily</strong><span>Generation frequency</span></div>
      </div>
      <h2 class="section-title">Pending Drafts</h2>
      ${draftCards}
      <h2 class="section-title" style="margin-top:48px;">Published Posts</h2>
      ${publishedCards}
      <div style="margin-top:32px;padding-top:32px;border-top:1px solid var(--border);">
        <a href="/blog.html" target="_blank" style="font-size:13px;color:var(--muted);">View public blog →</a>
      </div>
    </div>`;
}

async function publishPost(id, btn) {
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Publishing...';
  try {
    const res = await fetch("/api/blog-action", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "publish", id, password: adminPwd }),
    });
    const data = await res.json();
    if (res.ok) {
      document.getElementById(`card-${id}`).remove();
      showToast("✅ Post published successfully!", "success");
    } else {
      throw new Error(data.error);
    }
  } catch (e) {
    showToast("Error publishing post", "error");
    btn.disabled = false;
    btn.innerHTML = "✓ Publish";
  }
}

async function deletePost(id, btn, type = 'draft') {
  const label = type === 'published' ? 'published post' : 'draft';
  if (!confirm(`Delete this ${label}? This cannot be undone. It will be removed from the ${type === 'published' ? 'live blog immediately' : 'drafts queue'}.`)) return;
  btn.disabled = true;
  btn.innerHTML = "Deleting...";
  try {
    const res = await fetch("/api/blog-action", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "delete", id, password: adminPwd }),
    });
    if (res.ok) {
      document.getElementById(`card-${id}`).remove();
      showToast(type === 'published' ? "Post removed from live blog" : "Draft deleted", "success");
    } else { throw new Error(); }
  } catch {
    showToast("Error deleting post", "error");
    btn.disabled = false;
    btn.innerHTML = "✕ Delete";
  }
}

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove("show"), 3500);
}

// Auto-login if id param present (from email link)
const params = new URLSearchParams(window.location.search);
const draftId = params.get("id");
if (draftId) {
  document.getElementById("pwd-input").focus();
}
</script>
</body>
</html>
