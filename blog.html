<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local News | La Vista Penthouse Cabo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --deep-ocean: #1a3a4a; 
            --terracotta: #c4714a; 
            --warm-white: #faf8f4; 
            --border: #e0d8cc; 
            --gold: #c9a84c; 
        }

        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--warm-white); 
            color: #1c1c1c; 
            margin: 0; 
        }

        nav { 
            padding: 20px 48px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #fff; 
        }

        .nav-logo { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 24px; 
            font-weight: 600; 
            color: var(--deep-ocean); 
            text-decoration: none; 
        }

        .nav-logo span { color: var(--gold); }

        .container { 
            max-width: 900px; 
            margin: 60px auto; 
            padding: 0 24px; 
        }

        h1 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 48px; 
            color: var(--deep-ocean); 
            margin-bottom: 40px; 
        }
        
        /* Blog Post Cards */
        .post-card { 
            background: #fff; 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            overflow: hidden; 
            margin-bottom: 48px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); 
        }

        .post-image { 
            width: 100%; 
            height: 400px; 
            object-fit: cover; 
            background: #eee; 
        }

        .post-body { padding: 40px; }

        .post-date { 
            font-size: 12px; 
            color: var(--terracotta); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-weight: 500; 
            margin-bottom: 12px; 
        }

        .post-title { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 32px; 
            color: var(--deep-ocean); 
            margin: 0 0 20px 0; 
            line-height: 1.2; 
        }

        .post-content { 
            line-height: 1.8; 
            color: #444; 
            font-size: 16px; 
        }

        .post-content p { margin-bottom: 20px; }
        
        .post-content h2 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 24px; 
            color: var(--terracotta); 
            border-top: 1px solid var(--border); 
            margin-top: 40px; 
            padding-top: 20px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        /* ═══ LUXURY BUTTON HOVER EFFECTS ═══ */
        /* Targets the button generated by the Gemini script */
        .post-content a[style*="background-color"] {
            display: inline-block !important;
            transition: all 0.3s ease !important;
            border: 1px solid var(--gold) !important;
        }

        .post-content a[style*="background-color"]:hover {
            background-color: var(--gold) !important;
            color: white !important;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(26, 58, 74, 0.2);
            text-decoration: none !important;
        }

        @media (max-width: 600px) {
            .post-image { height: 250px; }
            .post-body { padding: 24px; }
            h1 { font-size: 36px; }
            nav { padding: 15px 24px; }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">La Vista <span>Penthouse</span></a>
        <a href="/" style="font-size: 13px; text-decoration: none; color: var(--deep-ocean); font-weight: 500; text-transform: uppercase; letter-spacing: 1px;">← Back to Home</a>
    </nav>

    <div class="container">
        <h1>Local News & Updates</h1>
        <div id="blog-container">Loading latest updates from Cabo...</div>
    </div>

    <script>
        async function loadPosts() {
            try {
                const res = await fetch('/.netlify/functions/blog-posts');
                const rawPosts = await res.json();
                const container = document.getElementById('blog-container');
                
                // BOUNCER LOGIC: Only show posts where status is 'published'
                const posts = rawPosts.filter(p => p.status === 'published');
                
                if (posts && posts.length > 0) {
                    // SORTING: Newest first based on available date fields
                    posts.sort((a, b) => new Date(b.date || b.createdAt || b.publishedAt) - new Date(a.date || a.createdAt || a.publishedAt));

                    container.innerHTML = posts.map(p => {
                        // HYBRID IMAGE LOGIC: Handles old Claude (p.image.url) and new Gemini (p.displayImage)
                        const imgUrl = p.displayImage || (p.image && p.image.url) || "/images/default-blog.jpg";
                        
                        // DATE LOGIC: Handles multiple date naming conventions
                        const postDate = p.date || p.publishedAt || p.createdAt;
                        
                        return `
                            <article class="post-card">
                                <img src="${imgUrl}" alt="${p.title}" class="post-image" onerror="this.src='/images/default-blog.jpg'">
                                <div class="post-body">
                                    <div class="post-date">${new Date(postDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</div>
                                    <h2 class="post-title">${p.title}</h2>
                                    <div class="post-content">${marked.parse(p.content || '')}</div>
                                </div>
                            </article>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = `
                        <div class="post-card" style="padding:60px; text-align:center; border-style: dashed;">
                            <p style="color: var(--muted); font-family: 'Cormorant Garamond'; font-size: 24px;">New Cabo updates are currently being curated.</p>
                            <p style="font-size: 14px; margin-top: 10px;">Check back soon for the latest local events.</p>
                        </div>`;
                }
            } catch (e) {
                console.error("Error loading blog:", e);
                document.getElementById('blog-container').innerHTML = "<p>Our concierge is currently updating local news. Please check back shortly.</p>";
            }
        }
        loadPosts();
    </script>
</body>
</html>
