<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local News | La Vista Penthouse Cabo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { --deep-ocean: #1a3a4a; --terracotta: #c4714a; --warm-white: #faf8f4; --border: #e0d8cc; --gold: #c9a84c; }
        body { font-family: 'DM Sans', sans-serif; background: var(--warm-white); color: #1c1c1c; margin: 0; }
        nav { padding: 20px 48px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: var(--deep-ocean); text-decoration: none; }
        .nav-logo span { color: var(--gold); }
        .container { max-width: 900px; margin: 60px auto; padding: 0 24px; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 48px; color: var(--deep-ocean); margin-bottom: 40px; }
        
        .post-card { background: #fff; border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 48px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .post-image { width: 100%; height: 400px; object-fit: cover; background: #eee; }
        .post-body { padding: 40px; }
        .post-date { font-size: 12px; color: var(--terracotta); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; margin-bottom: 12px; }
        .post-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: var(--deep-ocean); margin: 0 0 20px 0; line-height: 1.2; }
        .post-content { line-height: 1.8; color: #444; font-size: 16px; }
        .post-content p { margin-bottom: 20px; }
        
        .post-content h2 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 24px; 
            color: var(--terracotta); 
            border-top: 1px solid var(--border); 
            margin-top: 40px; 
            padding-top: 20px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        @media (max-width: 600px) {
            .post-image { height: 250px; }
            .post-body { padding: 24px; }
            h1 { font-size: 36px; }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <nav><a href="/" class="nav-logo">La Vista <span>Penthouse</span></a></nav>
    <div class="container">
        <h1>Local News & Updates</h1>
        <div id="blog-container">Loading latest updates from Cabo...</div>
    </div>

    <script>
        async function loadPosts() {
            try {
                const res = await fetch('/.netlify/functions/blog-posts');
                const rawPosts = await res.json();
                const container = document.getElementById('blog-container');
                
                // CRITICAL FIX: Only show posts where status is explicitly 'published'
                // This keeps your Gemini drafts hidden until you hit 'Publish' in the admin
                const posts = rawPosts.filter(p => p.status === 'published');
                
                if (posts && posts.length > 0) {
                    // Sort by date (newest first)
                    posts.sort((a, b) => new Date(b.date || b.createdAt || b.publishedAt) - new Date(a.date || a.createdAt || a.publishedAt));

                    container.innerHTML = posts.map(p => {
                        // HYBRID IMAGE LOGIC: Handles old Claude (p.image.url) and new Gemini (p.displayImage)
                        const imgUrl = p.displayImage || (p.image && p.image.url) || "/images/default-blog.jpg";
                        
                        // DATE LOGIC: Uses whatever timestamp is available
                        const postDate = p.date || p.publishedAt || p.createdAt;
                        
                        return `
                            <article class="post-card">
                                <img src="${imgUrl}" alt="${p.title}" class="post-image" onerror="this.src='/images/default-blog.jpg'">
                                <div class="post-body">
                                    <div class="post-date">${new Date(postDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</div>
                                    <h2 class="post-title">${p.title}</h2>
                                    <div class="post-content">${marked.parse(p.content)}</div>
                                </div>
                            </article>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = "<div class='post-card' style='padding:40px; text-align:center;'><p>New updates coming soon!</p></div>";
                }
            } catch (e) {
                console.error("Error loading blog:", e);
                document.getElementById('blog-container').innerHTML = "<p>Welcome to our local news section. Check back soon for Cabo updates!</p>";
            }
        }
        loadPosts();
    </script>
</body>
</html>
