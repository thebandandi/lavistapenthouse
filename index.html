<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Vista Penthouse | Luxury Vacation Rental Cabo San Lucas | Private Rooftop Jacuzzi & Bay Views</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>
<style>
  :root { --sand: #f5efe6; --warm-white: #faf8f4; --terracotta: #c4714a; --deep-ocean: #1a3a4a; --gold: #c9a84c; --text: #1c1c1c; --muted: #6b6b6b; --border: #e0d8cc; --card-bg: #ffffff; --success: #2d7d46; --error: #c0392b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--warm-white); color:var(--text); overflow-x:hidden; }
  nav { position:sticky; top:0; z-index:100; background:rgba(250,248,244,0.93); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:16px 48px; }
  .nav-logo { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; color:var(--deep-ocean); }
  .nav-logo span { color:var(--terracotta); }
  .gallery-grid { display:grid; grid-template-columns:1fr 1fr; grid-template-rows:380px 380px; gap:4px; position:relative; overflow:hidden; }
  .gallery-grid img { width:100%; height:100%; object-fit:cover; transition:transform .5s ease; cursor:pointer; }
  .gallery-grid img:hover { transform:scale(1.02); }
  .gallery-main { grid-column:1; grid-row:1/3; }
  .main-layout { max-width:1200px; margin:0 auto; display:grid; grid-template-columns:1fr 380px; gap:80px; padding:60px 48px; align-items:start; }
  .property-title { font-family:'Cormorant Garamond',serif; font-size:42px; font-weight:500; line-height:1.15; color:var(--deep-ocean); margin-bottom:12px; }
  .booking-widget { position:sticky; top:88px; border:1px solid var(--border); border-radius:20px; padding:32px; background:var(--card-bg); box-shadow:0 8px 48px rgba(0,0,0,.08); }
</style>
</head>
<body>
<nav><div class="nav-logo">La Vista <span>Penthouse</span></div></nav>
<div class="gallery-grid">
  <img class="gallery-main" src="https://res.cloudinary.com/dxrpu5chf/image/upload/v1773597542/eb4da665-417a-4392-9885-2a88eaef1974_rooftop_view_2_13_xshg2q.avif">
  <img src="https://res.cloudinary.com/dxrpu5chf/image/upload/v1773597525/526a296e-5666-4e6e-81d5-aea202041d8c_Best_nighttime_hot_tub_18_wyust4.avif">
  <img src="https://res.cloudinary.com/dxrpu5chf/image/upload/v1773597538/b3f0dc14-b454-4fac-beb2-4b2789fa8447_Best_daytime_hot_tub_19_oaluts.avif">
</div>
<div class="main-layout">
  <div class="left-col">
    <h1 class="property-title">La Vista Penthouse,<br>towards Cabo Bay</h1>
    <p>3 Bedrooms · 6 Guests · Private Rooftop Jacuzzi</p>
    <div id="availability-status">🔄 Syncing with Airbnb...</div>
  </div>
  <div class="right-col">
    <div class="booking-widget">
      <div style="font-size:32px; font-weight:600;">$350 / night</div>
      <button style="width:100%; padding:16px; background:var(--deep-ocean); color:white; border:none; border-radius:8px; margin-top:20px;">Check Availability</button>
    </div>
  </div>
</div>
<script>
  async function sync() {
    try {
      const res = await fetch('/api/get-availability');
      const data = await res.json();
      if(data.ranges) document.getElementById('availability-status').textContent = "✅ Airbnb Sync Successful";
    } catch(e) { console.log("Sync error", e); }
  }
  sync();
</script>
</body>
</html>
