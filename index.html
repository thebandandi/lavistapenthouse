<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Vista Penthouse | Luxury Vacation Rental Cabo San Lucas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>
<style>
    :root { --deep-ocean: #1a3a4a; --terracotta: #c4714a; --warm-white: #faf8f4; --border: #e0d8cc; --text: #1c1c1c; }
    body { font-family: 'DM Sans', sans-serif; background: var(--warm-white); color: var(--text); margin: 0; }
    nav { background: white; padding: 16px 48px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: var(--deep-ocean); }
    .main-layout { max-width: 1200px; margin: 0 auto; padding: 48px; display: grid; grid-template-columns: 1fr 380px; gap: 80px; }
    .gallery-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; height: 500px; margin-bottom: 20px; }
    .gallery-grid img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
    .booking-widget { border: 1px solid var(--border); border-radius: 12px; padding: 32px; background: white; position: sticky; top: 100px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .price { font-size: 32px; font-family: 'Cormorant Garamond', serif; font-weight: 600; }
    .book-btn { width: 100%; padding: 16px; background: var(--deep-ocean); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 20px; }
    .calendar-status { font-size: 13px; color: #666; margin-top: 10px; text-align: center; }
</style>
</head>
<body>
<nav><div class="nav-logo">La Vista Penthouse</div></nav>
<div class="main-layout">
    <div class="left-col">
        <div class="gallery-grid">
            <img src="https://res.cloudinary.com/dxrpu5chf/image/upload/v1773597542/eb4da665-417a-4392-9885-2a88eaef1974_rooftop_view_2_13_xshg2q.avif">
            <img src="https://res.cloudinary.com/dxrpu5chf/image/upload/v1773597525/526a296e-5666-4e6e-81d5-aea202041d8c_Best_nighttime_hot_tub_18_wyust4.avif">
        </div>
        <h1>Luxury Penthouse in Cabo San Lucas</h1>
        <p>3 Bedrooms · 6 Guests · Private Rooftop Jacuzzi</p>
        <hr>
        <div id="calendar-section">
            <h3>Availability</h3>
            <div id="status-text">🔄 Syncing with Airbnb...</div>
        </div>
    </div>
    <div class="right-col">
        <div class="booking-widget">
            <div class="price">$350 <span style="font-size:16px; font-weight:400;">/ night</span></div>
            <button class="book-btn">Reserve Now</button>
            <div class="calendar-status">Direct Booking 5% Discount Applied</div>
        </div>
    </div>
</div>

<script>
    async function fetchAvailability() {
        try {
            const res = await fetch('/api/get-availability');
            const data = await res.json();
            if (data.ranges) {
                document.getElementById('status-text').textContent = "✅ Calendar Synced Successfully";
            }
        } catch (e) {
            document.getElementById('status-text').textContent = "⚠️ Using static dates";
        }
    }
    fetchAvailability();
</script>
</body>
</html>
